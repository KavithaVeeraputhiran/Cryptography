<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD5 Hash Generator with Intermediate Steps</title>
    <script src="https://cloudflare.com"></script>
    <style>
        .step-box {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .highlight { color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">MD5 Visualizer</h1>
        <p class="text-gray-600 mb-6">Observe the internal 32-bit word transitions for each round.</p>

        <div class="mb-6">
            <label for="input" class="block text-sm font-medium text-gray-700 mb-2">Plaintext Input</label>
            <input type="text" id="input" placeholder="Enter text here..." 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            <button id="hashBtn" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200">
                Generate Hash & Steps
            </button>
        </div>

        <div id="output" class="hidden">
            <div class="border-t pt-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Intermediate Steps</h2>
                <div id="stepsContainer"></div>
            </div>
            <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                <h3 class="text-lg font-bold text-blue-800 mb-1">Final MD5 Hash:</h3>
                <p id="finalHash" class="text-2xl font-mono font-bold text-blue-600 break-all"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('hashBtn').addEventListener('click', () => {
            const input = document.getElementById('input').value;
            const result = md5(input);
            
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';
            
            result.steps.forEach(step => {
                const div = document.createElement('div');
                div.innerHTML = `<h3 class="font-bold text-gray-700 mb-1">${step.title}</h3><div class="step-box">${step.content}</div>`;
                container.appendChild(div);
            });

            document.getElementById('finalHash').innerText = result.hash;
            document.getElementById('output').classList.remove('hidden');
        });

        function md5(string) {
            const steps = [];
            const log = (title, content) => steps.push({ title, content });
            const toHex32 = (val) => "0x" + (val >>> 0).toString(16).toUpperCase().padStart(8, '0');

            // 32-bit safe math
            function rotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }

            function addUnsigned(lX, lY) {
                return (lX + lY) | 0; // Force 32-bit signed internally
            }

            // Primitive Functions
            const F = (x, y, z) => (x & y) | (~x & z);
            const G = (x, y, z) => (x & z) | (y & ~z);
            const H = (x, y, z) => x ^ y ^ z;
            const I = (x, y, z) => y ^ (x | ~z);

            // Transformation Rounds
            const FF = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac)), s), b);
            const GG = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac)), s), b);
            const HH = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac)), s), b);
            const II = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac)), s), b);

            function convertToWordArray(string) {
                const lMessageLength = string.length;
                const lNumberOfWords = (((lMessageLength + 8) - ((lMessageLength + 8) % 64)) / 64 + 1) * 16;
                const lWordArray = new Array(lNumberOfWords).fill(0);
                for (let i = 0; i < lMessageLength; i++) {
                    lWordArray[i >> 2] |= (string.charCodeAt(i) << ((i % 4) * 8));
                }
                lWordArray[lMessageLength >> 2] |= (0x80 << ((lMessageLength % 4) * 8));
                lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
                lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
                return lWordArray;
            }

            function wordToHex(lValue) {
                let hex = "";
                for (let i = 0; i < 4; i++) {
                    let byte = (lValue >>> (i * 8)) & 255;
                    hex += byte.toString(16).padStart(2, '0');
                }
                return hex;
            }

            log("Step 1: Input Analysis", `Input: "${string}"\nLength: ${string.length} characters`);
            let x = convertToWordArray(string);
            
            let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
            log("Step 2: Initialization", `Buffers (Unsigned Hex):\nA: ${toHex32(a)}, B: ${toHex32(b)}, C: ${toHex32(c)}, D: ${toHex32(d)}`);

            for (let k = 0; k < x.length; k += 16) {
                let AA = a, BB = b, CC = c, DD = d;

                // Round 1
                a = FF(a,b,c,d,x[k+0],7,0xD76AA478); d = FF(d,a,b,c,x[k+1],12,0xE8C7B756);
                c = FF(c,d,a,b,x[k+2],17,0x242070DB); b = FF(b,c,d,a,x[k+3],22,0xC1BDCEEE);
                a = FF(a,b,c,d,x[k+4],7,0xF57C0FAF); d = FF(d,a,b,c,x[k+5],12,0x4787C62A);
                c = FF(c,d,a,b,x[k+6],17,0xA8304613); b = FF(b,c,d,a,x[k+7],22,0xFD469501);
                a = FF(a,b,c,d,x[k+8],7,0x698098D8); d = FF(d,a,b,c,x[k+9],12,0x8B44F7AF);
                c = FF(c,d,a,b,x[k+10],17,0xFFFF5BB1); b = FF(b,c,d,a,x[k+11],22,0x895CD7BE);
                a = FF(a,b,c,d,x[k+12],7,0x6B901122); d = FF(d,a,b,c,x[k+13],12,0xFD987193);
                c = FF(c,d,a,b,x[k+14],17,0xA679438E); b = FF(b,c,d,a,x[k+15],22,0x49B40821);
                log(`Step 3: Block ${k/16} - Round 1`, `A: ${toHex32(a)}, B: ${toHex32(b)}, C: ${toHex32(c)}, D: ${toHex32(d)}`);

                // Round 2
                a = GG(a,b,c,d,x[k+1],5,0xF61E2562); d = GG(d,a,b,c,x[k+6],9,0xC040B340);
                c = GG(c,d,a,b,x[k+11],14,0x265E5A51); b = GG(b,c,d,a,x[k+0],20,0xE9B6C7AA);
                a = GG(a,b,c,d,x[k+5],5,0xD62F105D); d = GG(d,a,b,c,x[k+10],9,0x02441453);
                c = GG(c,d,a,b,x[k+15],14,0xD8A1E681); b = GG(b,c,d,a,x[k+4],20,0xE7D3FBC8);
                a = GG(a,b,c,d,x[k+9],5,0x21E1CDE6); d = GG(d,a,b,c,x[k+14],9,0xC33707D6);
                c = GG(c,d,a,b,x[k+3],14,0xF4D50D87); b = GG(b,c,d,a,x[k+8],20,0x455A14ED);
                a = GG(a,b,c,d,x[k+13],5,0xA9E3E905); d = GG(d,a,b,c,x[k+2],9,0xFCEFA3F8);
                c = GG(c,d,a,b,x[k+7],14,0x676F02D9); b = GG(b,c,d,a,x[k+12],20,0x8D2A4C8A);
                log(`Step 4: Block ${k/16} - Round 2`, `A: ${toHex32(a)}, B: ${toHex32(b)}, C: ${toHex32(c)}, D: ${toHex32(d)}`);

                // Round 3
                a = HH(a,b,c,d,x[k+5],4,0xFFFA3942); d = HH(d,a,b,c,x[k+8],11,0x8771F681);
                c = HH(c,d,a,b,x[k+11],16,0x6D9D6122); b = HH(b,c,d,a,x[k+14],23,0xFDE5380C);
                a = HH(a,b,c,d,x[k+1],4,0xA4BEEA44); d = HH(d,a,b,c,x[k+4],11,0x4BDECFA9);
                c = HH(c,d,a,b,x[k+7],16,0xF6BB4B60); b = HH(b,c,d,a,x[k+10],23,0xBEBFBC70);
                a = HH(a,b,c,d,x[k+13],4,0x289B7EC6); d = HH(d,a,b,c,x[k+0],11,0xEAA127FA);
                c = HH(c,d,a,b,x[k+3],16,0xD4EF3085); b = HH(b,c,d,a,x[k+6],23,0x04881D05);
                a = HH(a,b,c,d,x[k+9],4,0xD9D4D039); d = HH(d,a,b,c,x[k+12],11,0xE6DB99E5);
                c = HH(c,d,a,b,x[k+15],16,0x1FA27CF8); b = HH(b,c,d,a,x[k+2],23,0xC4AC5665);
                log(`Step 5: Block ${k/16} - Round 3`, `A: ${toHex32(a)}, B: ${toHex32(b)}, C: ${toHex32(c)}, D: ${toHex32(d)}`);

                // Round 4
                a = II(a,b,c,d,x[k+0],6,0xF4292244); d = II(d,a,b,c,x[k+7],10,0x432AFF97);
                c = II(c,d,a,b,x[k+14],15,0xAB9423A7); b = II(b,c,d,a,x[k+5],21,0xFC93A039);
                a = II(a,b,c,d,x[k+12],6,0x655B59C3); d = II(d,a,b,c,x[k+3],10,0x8F0CCC92);
                c = II(c,d,a,b,x[k+10],15,0xFFEFF47D); b = II(b,c,d,a,x[k+1],21,0x85845DD1);
                a = II(a,b,c,d,x[k+8],6,0x6FA87E4F); d = II(d,a,b,c,x[k+15],10,0xFE2CE6E0);
                c = II(c,d,a,b,x[k+6],15,0xA3014314); b = II(b,c,d,a,x[k+13],21,0x4E0811A1);
                a = II(a,b,c,d,x[k+4],6,0xF7537E82); d = II(d,a,b,c,x[k+11],10,0xBD3AF235);
                c = II(c,d,a,b,x[k+2],15,0x2AD7D2BB); b = II(b,c,d,a,x[k+9],21,0xEB86D391);
                log(`Step 6: Block ${k/16} - Round 4`, `A: ${toHex32(a)}, B: ${toHex32(b)}, C: ${toHex32(c)}, D: ${toHex32(d)}`);

                a = addUnsigned(a, AA); b = addUnsigned(b, BB);
                c = addUnsigned(c, CC); d = addUnsigned(d, DD);
            }

            return {
                hash: wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d),
                steps: steps
            };
        }
    </script>
</body>
</html>
